<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoirAI — Preserve Your Life Stories</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    color: #2c2c2c;
    background: #faf9f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1a3a4a;
    margin-bottom: 16px;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: #6b7c6b;
    margin-bottom: 40px;
  }

  .coming-soon {
    font-size: 15px;
    color: #888;
    font-weight: 300;
    margin-bottom: 8px;
  }

  .contact {
    font-size: 15px;
    color: #666;
    font-weight: 300;
  }

  .contact a {
    color: #2a5a6a;
    text-decoration: none;
  }

  .contact a:hover {
    text-decoration: underline;
  }

  footer {
    position: fixed;
    bottom: 24px;
    font-size: 13px;
    color: #aaa;
    font-weight: 300;
  }

  footer a {
    color: #999;
    text-decoration: none;
    margin: 0 10px;
  }

  footer a:hover {
    color: #666;
    text-decoration: underline;
  }
</style>
</head>
<body>
  <div class="logo">MemoirAI</div>
  <div class="tagline">Preserve your life stories with a phone call.</div>
  <p class="coming-soon">Coming soon.</p>
  <p class="contact"><a href="mailto:gelev1@gmail.com">gelev1@gmail.com</a></p>

  <footer>
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Service</a>
  </footer>
</body>
</html>
